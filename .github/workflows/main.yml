# ══════════════════════════════════════════════════════════════════════════════
# metadata
# ══════════════════════════════════════════════════════════════════════════════
name: build_releases                        
run-name: Tests for ${{ github.ref_name }}

# ══════════════════════════════════════════════════════════════════════════════
# triggers
# ══════════════════════════════════════════════════════════════════════════════
on:
  push:
    branches: [releases]
  workflow_dispatch:            # Manual trigger on Github interface

# ══════════════════════════════════════════════════════════════════════════════
# security (permissions)
# ══════════════════════════════════════════════════════════════════════════════
permissions:
  contents: read

# ══════════════════════════════════════════════════════════════════════════════
# global configuration (Usable by all  jobs)
# ══════════════════════════════════════════════════════════════════════════════
env:
  NODE_VERSION: '20'

# ══════════════════════════════════════════════════════════════════════════════
# JOBS (work units)
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
      - name: Install Fastforge
        run: dart pub global activate fastforge
      - name: Build and release
        run: fastforge release --name production
        env:
          API_KEY: ${{ secrets.API_KEY }}
